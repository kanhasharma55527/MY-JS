<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | with kanha sharma</title>
</head>

<body style="background-color: #212121; color: #fff;">

    <div class="parents">
        <!-- this is comment -->
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const parent = document.querySelector('.parents')
            console.log(parent)
            console.log(parent.children)

            const days = document.querySelectorAll('.day')

            // loop + print
            days.forEach(day => {
                console.log(day.innerText)

                // change color of Tuesday (no hardcoding index)
                if (day.innerText === "Tuesday") {
                    day.style.color = "orange"
                }
            })

            // first child
            console.log(parent.firstElementChild)

            const firstDay = days[0]

            console.log(firstDay)
            console.log(firstDay.parentElement)
            console.log(firstDay.nextElementSibling)

            // all nodes (including text + comment)
            console.log("NODES:", parent.childNodes)

        })
    </script>

</body>
</html>
